version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis-kayos
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kayos_auth_api:
    build: .
    container_name: kayos_auth_api
    ports:
      - "5001:5000"
    env_file:
      - .env
    depends_on:
      - redis
    links:
      - redis
    volumes:
      - .:/app
    restart: always

volumes:
  redis_data:
