# 🎲 KAYOSCRYPTO 3D ENTERPRISE CONFIGURATION
# Configuração Enterprise Grade para Cubo Sator 3D

version: "3.0.enterprise"
environment: "production"

# 🔐 CONFIGURAÇÕES DE SEGURANÇA
security:
  compliance_level: "FIPS_140_3"
  quantum_resistance: true
  zero_trust_architecture: true
  
  # Políticas de Chaves
  key_management:
    rotation_days: 90
    backup_enabled: true
    hsm_protected: true
    max_key_versions: 3

  # Autenticação Multi-Fator
  mfa:
    required: true
    providers: ["TOTP", "WebAuthn", "Biometric"]
    backup_codes: true

# 🎲 CONFIGURAÇÃO DO CUBO SATOR 3D
sator_cube_3d:
  security_level: "enterprise"
  
  # Faces do Cubo
  faces:
    north:
      verso: "Kyber512"
      anverso: "Kyber1024"
      security: "quantum_256"
    
    south:
      verso: "P-256" 
      anverso: "P-521"
      curve: "SECP521R1"
    
    east:
      verso: "AES-128-GCM"
      anverso: "AES-256-GCM"
      key_size: 32
    
    west:
      verso: "SHA-256"
      anverso: "SHA3-512"
      digest_size: 64
    
    top:
      verso: "ChaCha20"
      anverso: "XChaCha20"
      nonce_size: 24
    
    bottom:
      verso: "HMAC-SHA256" 
      anverso: "BLAKE2b"
      digest_size: 64

  # Rotações Padrão
  default_rotations: ["X_AXIS", "Z_AXIS", "TIME_AXIS"]

# 🏦 CONFIGURAÇÃO HSM
hsm:
  providers:
    aws_cloudhsm:
      enabled: true
      cluster_id: "${AWS_HSM_CLUSTER_ID}"
      region: "us-east-1"
    
    azure_dedicated_hsm:
      enabled: true  
      hsm_name: "kayos-enterprise-hsm"
      resource_group: "kayos-security-rg"
  
  failover:
    enabled: true
    timeout_ms: 5000
    max_retries: 3

# ☁️ CONFIGURAÇÃO CLOUD
cloud:
  provider: "multi"  # aws, azure, gcp, multi
  
  aws:
    region: "us-east-1"
    kms_key_id: "${AWS_KMS_KEY_ID}"
  
  azure:
    region: "eastus"
    key_vault_name: "kayos-keyvault"
  
  gcp:
    region: "us-central1" 
    kms_key_ring: "kayos-keyring"

# 📊 MONITORING & AUDIT
monitoring:
  enabled: true
  
  metrics:
    provider: "prometheus"
    port: 9090
    interval_seconds: 30
  
  logging:
    level: "INFO"
    format: "json"
    retention_days: 365
  
  audit:
    blockchain_enabled: true
    immutable_logs: true
    compliance_reporting: true

# 🔧 CONFIGURAÇÃO API
api:
  fastapi:
    title: "KayosCrypto 3D Enterprise API"
    version: "3.0.0"
    docs_enabled: true  # Apenas desenvolvimento
    
  security:
    cors_origins: ["https://admin.kayoscrypto.com"]
    rate_limiting:
      enabled: true
      requests_per_minute: 100
      
  middleware:
    https_redirect: true
    security_headers: true
    request_id: true

# 🗄️ BANCO DE DADOS
database:
  postgresql:
    host: "${DB_HOST}"
    port: 5432
    database: "kayos_enterprise"
    ssl_mode: "require"
    
  encryption:
    at_rest: true
    in_transit: true
    key_rotation_days: 30

# 🚀 DEPLOYMENT
deployment:
  kubernetes:
    namespace: "kayos-enterprise"
    replicas: 3
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi" 
        cpu: "500m"
    
  health_checks:
    liveness_path: "/health"
    readiness_path: "/ready"
    initial_delay_seconds: 30

# 🔍 THREAT DETECTION
threat_detection:
  ai_anomaly_detection: true
  real_time_monitoring: true
  automatic_response: true
  
  alerts:
    slack_webhook: "${SLACK_WEBHOOK}"
    pagerduty_key: "${PAGERDUTY_KEY}"
    email: "security@kayoscrypto.com"
